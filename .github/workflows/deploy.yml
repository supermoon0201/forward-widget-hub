name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  repository_dispatch:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare credentials
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — no Cloudflare credentials configured. Set CF_API_TOKEN and CF_ACCOUNT_ID secrets to enable deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: "22"

      - run: npm ci
        if: steps.creds.outputs.configured == 'true'

      - name: Setup Cloudflare Resources
        if: steps.creds.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Create D1 database (ignore error if already exists)
          npx wrangler d1 create forward-widget-hub-db 2>&1 | tee /tmp/d1.txt || true

          # Extract database ID from create output
          DB_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' /tmp/d1.txt | head -1)

          # If not found (already existed), get from list
          if [ -z "$DB_ID" ]; then
            DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="forward-widget-hub-db") | .uuid')
          fi

          echo "D1 Database ID: $DB_ID"

          # Update wrangler.toml with actual database ID
          sed -i "s/database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml

          # Initialize schema (idempotent via IF NOT EXISTS)
          npx wrangler d1 execute forward-widget-hub-db --file=d1-schema.sql --remote

          # Create R2 bucket (ignore error if already exists)
          npx wrangler r2 bucket create forward-widget-hub-storage 2>/dev/null || true

      - name: Build
        if: steps.creds.outputs.configured == 'true'
        run: npm run build:cf

      - name: Deploy
        if: steps.creds.outputs.configured == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy
